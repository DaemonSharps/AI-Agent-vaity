services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Ollama__BaseUrl: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongo
      - ollama

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:0.31.1
    restart: unless-stopped
    gpus: all
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27055:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  ollama-data:
  mongo_data:
